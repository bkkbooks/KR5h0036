front:
  text: 無生訣經卷第四槐四
  hash: sha256:b7509d52944aefba15e202883decd33397a7e575f4448ec3c42da58d20984b4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0036_HFL_000-001a, image: hfl/1082/1082-004.png}
body:
  text: 釋迦牟尼佛法本法無法無法法亦法今付無法時法法何會法摩訶迦葉尊者法法本來法無法無非法何于一法中有法有不法啇那和修尊者非法亦非心無心亦無法説是心法時是法非心法優波毱尊者心自本來心本心非有法有法有本心非心非本法鶴勒那尊者認得心性時可説不思議了了無可得得時不説知菩提達磨大師在胎為身在世為人在眼曰見在耳曰聞在鼻辦香在口談論在手執捉在足運奔遍現俱該法界收攝在一微塵識者知是佛性不識唤作精魂亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同纏超然名之曰袒迷時人逐法解時法逐人解則識攝色迷則色攝識但有心分别計較自心現量者悉皆是夢若識取心本寂滅無一動念處是名正覺僧璨大師華種雖因地從地種華生若無人下種華地盡無生至道無難唯嫌揀擇但莫愛憎洞然明白圓同太虛無欠無餘良由取捨所以不如莫逐有緣莫逐空忍一種平懷泯然自盡止動歸動止更彌動惟滯兩邊寧知一種一種不通兩處失功遣有沒有從空背空歸根得旨隨照失宗須臾返照勝却前空前空轉變皆由妄見不用求真唯須息見二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能由境滅境逐能沉境由能境能由境能欲知兩段元是一空一空同兩齊含萬象智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良用斟酌夢幻空花何勞把著得失是非一時放却眼若不睡諸夢自除心若不異萬法一如止動無動動止無止兩既不成一何有爾一即一切一切即一但能如是何慮不畢一切無心自性戒一切無礙自性慧不增不退自金剛身去身來本三昧不見一法存無見大似浮雲遮日面不知一法守空知還如太虛生閃電此之知見瞥然興錯認曾何解方便汝當一念自知非自己靈光常顯見弘忍大師有情來下種因地果還生無情既無種無性亦無生慧能大師菩提本無樹明鏡亦非臺本來無一物何處塵埃心迷法華轉心悟轉法華誦經久不明與義作仇家無念念即正有念念成邪有無俱不計長御白牛車定是慧體慧是定用即慧之時定在慧即定之時慧在定猶如燈光有燈即光無燈即暗燈是光之體光是燈之用名雖有二體本不殊欲求見佛但識衆生只為衆生迷佛非是佛迷衆生自性若悟衆生是佛自性若迷佛是衆生自性平等衆生是佛自性憸邪佛是衆生我心自有佛自佛是真佛自若無心佛何處求真佛故經云心生種種法生心滅種種法滅凡夫即佛煩惱即菩提前念迷即凡夫後念悟即佛前念著境即煩惱後念離境即菩提法融禪師境緣無好醜好醜起於心心若不強名妄情何處起妄情既不起真心任偏知慧忠禪師念想由來幻真性無終始若得此中意長波當自止人法雙淨善惡兩忘直心真意菩提道場神秀禪師一切佛法自心本有將心外求捨父逃走南嶽思大師道源不遠性海非遙但向己求莫從他覔覔即不得得亦不真天皇悟公任性逍遙隨緣放曠但盡凡心别無聖解本淨禪師佛因心悟心以佛彰若悟無心佛亦不有道本無心無心名道若了無心無心即道見聞知覺無障礙聲香味觸常三昧如烏空中只麼飛無取無捨無憎愛若會應處本無心始得名為觀自在見道方修道不見復何修道性如虛空虛空何所有遍觀修道者撥火覔浮漚但看美傀儡線斷一齊休推真真無相窮妄妄無形返觀推窮心知心亦假名善既從心生惡豈離心有善惡是外緣於心實不有捨惡逆何處取善令誰守傷嗟二貝人攀緣兩頭走若悟本無心始悔從前咎南陽忠國禪師青夢夤緣直上寒松之頂白雲淡濘出殁太虛之中萬法本間而人自鬧衆生迷時結性成心猶寒則水凝為氷衆生悟時釋心成性猶暖則氷涣為水法法法元無法空空空亦不空靜喧語默本來同夢里何勞説夢有用用中無用無功功裡施功還如果熟自然紅莫問如何修種盤山積公心月孤圓光含萬象光非照境境亦非存光境俱忘復是何物大珠海公若不隨聲色動念不逐相貌心解自然能無事去般若經云九類衆生一身具足隨造隨成是故無明為卵生煩惱包裹為胎生愛水浸潤為濕生欻起煩惱為化生悟即是佛迷號衆生菩薩以念念心心為衆生若了念念心體俱空名度衆生也智者於自本際上度於未形未形既空即知實無衆生得滅度者善慧大士有物先天地無形本寂寥能為萬象主不逐四時凋空手把鋤頭步行騎水牛人從橋上過橋流水不流夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如形影相似欲識佛去處祗這語聲是鑒貞禪師眼光隨色盡耳識逐聲消還源無别旨昨日與今朝夾山密公心本是佛因念起而漂沉岸實不移因舟行而騖驟玄沙備公鏡照諸像不亂光輝鳥飛空中不雜空色傅大士水中鹽味色裏膠青畢竟是有不見其形妄計因成執迷繩謂是蛇疑心生暗鬼病眼見空花一境雖無異三人乃見差了兹名不實長御白牛車法雲白公離朱有意白浪徒爾滔天象罔無心明珠忽然在掌永眀壽公如隨色之摩尼衆相現而本體不動似應聲之山谷群響發而起處無心孤猿叫落中岩月野客吟殘半夜燈此境此時誰會得白雲深處坐禪僧真心自體非言所詮湛如無際之虛空瑩若圓明之淨鏡毁贊不及義理難通不可以有無處所窮其幽迹不可以識智言詮談其妙體唯有入者只在心知如搗萬種而為香爇一塵而已具足衆氣似入大海而澡浴掬微滴而已用百川見性之時性本離念非有念而可除觀物之際物本無形非有物而可遣滿眼見色滿耳聞聲不隨不壞方了色聲正性若墮聲色之門即墮凡夫若壞色聲之相即入小乘是以如來正眼普照無遺豈同凡夫相盲二乘眇目則逄緣不礙觸境無生龐藴居士但願空諸所有愼勿實諸所無水明壽公真源湛寂覺海澄清絶名相之端無能所之迹最初不覺忽起動心因明起照隨照立塵如鏡現像頓起根身從此遺真失性執相徇名積滯著之情塵結相續之識浪鎖真覺於夢夜沉迷三界之中瞽智眼於昏衢匍匐九居之內向不遷境上虛受輪回於無脫法中自生繫縛如春蠶作繭似秋蛾赴燈以二見妄想之絲纏苦聚之業質用無明貪愛之翼撲生死之火輪復有邪根外種小智權機不了生死之病源罔知人我之見本唯欲厭喧斥動破相析塵雖云味靜冥空不知埋真拒覺如不辨眼中之赤青但滅燈上之重光罔窮識內之幻身空避日中之虛影斯則勞形役思喪力捐功不異足水助氷投薪益火豈知重光在青虛影隨身除病眼而重光自消息幻質而虛影當滅若能回光就己反境觀心佛眼明而業影空法身現而塵迹絶以自覺之智創剖開纏內之心珠用一念之慧鋒斬斷塵中之見綱此誠窮心之旨達識之詮慈雲慧禪師片月浸寒潭微雲映碧空若於達道人好個真消息黃山輪公投赤水以尋珠入荆山而覔玉從門入者不是家珍認影迷頭豈非大錯天衣懷公雁過長空影沉寒水雁無遺蹤之意水無留影之心圭峯禪師用則波騰海沸全真體以運行體則鑑明水靜舉隨緣而會寂心無自相託境方生境水空由心故現智真禪師心本絶塵何用洗身中無病豈求醫欲知是佛非身處明鑒高懸未照時李長公十世古今終始不離於當念無邊剎境自他不隔於毫端智凡不礙狀多鏡以納衆形彼此無妨若千燈而共一室天臺觀公高超名相妙體全彰逈出古今真機獨露握驪珠而鑑物物物流輝擲寶劍以揮空空空絶迹雲門侃公塵勞未破觸境千差心鑒圓明絲毫不立靈光皎皎獨露真常今古兩忘聖凡雙絶到這裏始能卷舒自在應用無虧出沒往還人間天上大靜禪師夜間間坐心念紛飛却將紛飛之心以究紛飛之處究之無處則紛飛之念何存返究究心則能究之心安在能照之智本空所緣之境亦寂寂而非寂者蓋無能寂之人也照而無照者蓋無所照之境也境智俱寂心慮安然此乃還源之要道也見物便見心無物心不現十分通塞中真心無不遍若心知識解卻成顛倒見睹境能無心始見菩提固永嘉禪師心與空相應則譏毁贊譽何憂何喜身與空相應則刀割香塗何苦何樂報與空相應則施與劫奪何得何失心不是有心不是無心不非有心不非無是有是無即墮是非有非無非墮非絶學無為間道人不除妄想不求真無明實性即佛性幻化空身即法身法身覺了無一物本原自性天真佛五陰浮雲空去來三毒永泡虛出沒寂寂生無記惺惺生亂想寂寂雖能治亂想而還生無記惺惺雖能治無記而還生亂想故曰惺惺寂寂是無記寂寂非寂寂惺惺是亂想惺惺非凡人多於事礙理境礙心常欲逃境以安心遺事以存理不知乃是心礙境理礙事但令心空境自空理寂事自寂勿倒用心也此法即心心外無法此心即法法外無心心自無心亦無無心者若將心無心心卻反成有為有貪嗔癡故立戒定慧本無煩惱焉用菩提故祖師云佛説一切法為除一切心我無一切心何用一切法竇持禪師悟心容易息心難息得心源到處間斗轉星移天欲曉白雲依舊覆青山陵郁山主我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬垛佛日才公城市喧繁山林寂靜雖然如此動靜一如生死不二四時輪轉物理自然夏不去而秋自來風不涼而人自爽廣慧禪師佛為無心悟心因有佛迷佛心清淨處雲外野猿啼圓悟禪師鳥飛空境鳥過而空中還留影否魚遊浮境魚逝而浮內尚遺迹否聖心應物亦復如是善勝禪師揚聲止響不知聲是響根美影逃形不知形為影本以法問法不知法本無法以心傳心不知心本無心龍濟禪師風動心搖樹雲生性起塵若明今日事昧郤本來人翠竹黃花非外境白雲明月露全身頭頭盡是吾家物信手拈來不是塵無著禪師一葉扁舟泛渺茫呈撓舞棹别宫啇雲山水月都拋郤嬴得莊周一夢長雲駊月運舟行岸移不知妄想之雲自非真月何動攀緣之舟常泛覺岸靡移雲巖禪師一翳在目千華亂空一妄在心恆沙生滅翳陰華盡妄滅真存病差藥除氷融水在飈谷投響則毁譽共銷月池浸色則物我俱謝在欲渾無欲居塵不染塵百花叢內過一襲不黏身景岑禪師礙處非墻壁通處沒虛空若人如是解心色本來同晦堂禪師愚人除境不除心智者除心不除境不知境本如如觸目遇緣常鎮定南臺和尚南臺靜坐一爐香終日凝然萬慮忘不是息心除妄想都緣無事可思量宗一禪師美玉藏頑石蓮華出淤泥須知煩惱處悟即是菩提曰空祗為破有曰有亦以除空亦復以有息有以空消空乃至言語道斷心思路絶尚不名空何曾號有仲宣禪師凡聖本來不二迷悟豈有殊途非涅槃之可欣非生死之可厭但能一言了悟不起坐而印證無生一念回光不舉步而遍周沙界感而遂通猶蟾光之映水靜而吾應若空谷之隨聲論佛性則空論佛心則實有此實心斯佛性不為頑空有此空性斯佛心不為著象紹悟禪師一重山盡一重山坐斷孤峰子細看雲捲霧收山嶽靜楚天空闊一輪寒智間禪師秋月之輝離喧始見寒泉之響入定乃聞故動念失覺息念冥真種福果於耳根開覺花於心地有為雖偽棄之則佛道難成無為雖真執之則慧性不朗孤峰長老日用無非道心安即是禪幽棲雲壑底夢寐雪蓬邊惟寬禪師真修者不得勤不得忘勤即近執著忘即落無明萬漚起而復破水性常存千燈明而復滅火性原在忘情之心不住於相如湯消氷氷湯俱盡無可分别觸境之心未能不動如谷應聲即應即止無復有餘宗一禪師秋潭月影靜夜鐘聲隨叩擊以無虧觸波瀾而不散開先照禪師諸人心心不停念念無住若能不停處停念處無念自合無生之理以一散萬月墜萬川即萬影收萬歸一水歸一壺惟一月展則彌輪法界收來毫髮無端玉泉遠禪師一印印空萬象收歸古鑑中一印印水秋蟾影落千江裏一印印泥細觀文彩未生時保寧禪師三界唯心萬法唯識檻外雲生簷前雨滴澗水湛如藍山花開似錦此時若不究根源直待當來問彌勒佛鑒禪師至道無難唯嫌採擇桃花紅李花白誰能融融只一色紫燕語黃鶯鳴誰道關關只一聲明鏡當臺豈分靜躁孤雲出岫寧係去留因妄説真真無自相從真起妄妄體本虛妄既歸空真亦不立智達禪師境立心便有心無境不生境虛心寂寂心照境泠泠於氷鏡中見自己像於燈月中見自己影於山谷中見自己聲白圭兆禪師空中飛鳥不知空是家鄉水底遊魚忘却水為性命諸人請各立地定著精神一念回光豁然自照何異空中紅日獨運無私盤內明珠不撥自轉琳公其宗也離心意識其旨也超去來今離心意誠故品萬類不見差殊超去來今故盡十方更無滲漏當頭不犯徹底無依悟向朕兆未生之前用在功勛不犯之處照覺白師添一絲毫如眼中著屑減一絲毫似肉上剜瘡依法不依人依義不依語依智不依識依了經義不依不了經義寒便向火熱即搖扇飢時吃飯困來打眠所以道趙州庭前柏香巖嶺後松栽來無别用祗為引清風雲峰濬師瘦竹長松滴翠香流風踈月度微涼不知誰住原西寺每日鐘聲送夕陽風柯月渚並可傳心煙島雲林咸提妙旨寶志和尚妄身臨鏡照影影與妄身不殊但欲去影留身不知身亦本虛身本與影不異不得一有一無若欲存一捨一永與真理相踈愛若愛聖憎凡生死海裏沉浮煩惱因心故有無心煩惱何居不勞分别取相自然得道須臾龍牙和尚在夢那知夢是虛覺來方覺夢中無迷時恰是夢中事悟後還同睡起夫尋牛須訪迹學道訪無心迹在牛還在無心道易尋文益禪師一朵菡萏蓮兩株青瘦柏長何僧家庭何勞問高格同安禪師枯木岩前差路多行人到此盡蹉跎鷺立雪非同色明月蘆花不似他了了了時無所了玄玄玄處亦須河殷勤為唱玄中曲空裏蟾光撮得麼雲頂山僧間坐冥然聖莫知縱言無物比方伊石人把板雲中拍水女含笙水底吹若道不聞渠未曉欲尋其響你還疑教君唱和仍須和休問宫啇竹與絲丹霞和尚識得衣中寶無明醉自醒百骸雖潰散一物鎮長靈知境渾非體神珠不定形悟則三身佛迷疑萬卷經在心心可測歷耳耳難聽罔象先天地玄泉出杳冥本剛非鍛鍊元淨莫澄淳盤泊輪朝日玲瓏映曉星瑞光流不滅真氣觸還生鑒照崆洞寂羅籠法界明解語非關舌能言不是聲絶邊弭汗漫無際等空平見月非觀指還家莫問程識心心則佛何佛更堪成通智禪師真我本有迷之而無妄我本無執之而有若要了心無心可了無了之心是名真心真妄交徹即凡心而見佛心事理雙修依本智而求佛智崇化贇師印空印泥印水平地寒濤競起假饒去就十分終是靈龜曳尾僧淡交題像圖形期自見自見郤傷神已是夢中夢更逢身外身水花凝幻質墨彩聚空塵堪笑余兼爾俱為未了人遁庵珠師玉露垂青草金風動白蘋一聲寒雁過唤起未醒人如日發焰帶微塵而共紅非實紅也如水澄清含輕雲而俱緑非實緑也山谷公衲僧命脈古佛心宗如淨月輪出則萬波分影如吹毛劔用則千里無人欲火而以戒沃之嗔火而以定沃之無明火而以慧沃之靈泉混混消除煩躁之裏智水涓涓灌溉清涼之府千江有水一輪寶月映寒潭萬井無煙遍地金風吹泠面山堂浮師壩胝一指頭一毛拔九牛華嶽連天碧黃河徹底流截著指急回眸青箬笠前無限事緑簑衣底一時休覺海禪師碧落淨無雲秋空明有月長江瑩如練清風來不歇林下道人幽相看情共悅雖然猶是建化門中事作麼生是道人分上事間來石上觀流水欲洗禪衣未有塵臨濟禪師一念心疑被地來礙一念心愛被水來溺一念心嗔被火來焚一念心喜被風來飄若能如是辨得不被境轉便處處用境才涉唇吻便落意思直饒透脫猶在沉淪終日吃飯未曾咬著一粒米終日穿衣未曾挂著一絲頭才能變大地為黃金攪長河為酥酪法為禪師法身無相不可以聲音求妙道無言不可以文字會縱使超佛越祖猶落階梯直饒説妙談玄終挂唇齒須是功勛不犯影迹不留枯木寒巖更無津潤幻人木馬情識皆空方能垂手入鄽轉身異類却不道無漏國中留不住却來煙塢寒沙從諗禪師如明珠在掌胡來胡現漢來漢現把一枝草為丈六金身為一枝草用智明禪師題像兩洗淡紅桃萼嫩風搖淺碧柳絲輕白雲影裡怪石露緑水光中古木清噫你是何人牧正禪師華開壠上柳綻堤邊黃鳥調叔夜之琴芳草入謝公之句何必見色明心聞聲悟道非惟水上覓漚已是眼中著屑迷時須假三乘教悟後方知一字無墮竈和尚鏡凹照人瘦鏡凸照人肥不如打破鏡還我舊面皮斷際禪師念非忘塵而不息塵非息念而不忘忘塵而息息無能息息念而忘忘無所忘大妄非愚出真不智生之妄名真迷真曰妄豈有妄隨愚變真逐智回真妄不差智愚自異耳故觀師云迷真妄念生悟真妄即止理明則言語道斷何言之能議旨會則心行處滅何觀之能思故天臺云口欲言而辭喪心欲思而慮忘法法虛融心心寂滅本自非有誰強言無何喧擾之可喧何寂靜之可寂若知物我冥一彼此無非道場何必徇喧雜於人間散寂寞於空谷是以釋動求靜者憎枷愛杻也離怨求親者厭檻欣籠也若以知知寂此非無緣知如手執如意非無如意手若以自知知亦非無緣知如手自作拳非是不拳手亦不知寂寂亦不自知知不可為無知自性了然故不同於木石手不執如意亦不自作拳不可為無手以手安然故不同於兔角前際無煩惱可除中際無自性可守後際無佛可成是謂三際斷絶是謂三業清涼我一舉心已屬過去我心未舉方明未來非未來心即過去心現在之心復在何處學者知一念才起了不可得是過去物過去不有未來亦空是未來佛即今念念不住是現在佛念念相應即念念成佛此是最初方便之門慧日禪師一躍躍翻四大海一拳拳倒須彌山佛祖位中留不住又吹魚笛泊羅灣不用求心唯須息見三祖太師雖然回避金鈎殊不知已吞紅線慧日且不然不用求真併息見倒騎牛兮入佛殿牧笛一聲天地寬稽首曇真個黃面布袋和尚我有一布袋虛空無挂礙展開遍十方人時觀自在一鉢千家飯孤身萬里遊青目睹人少問路白雲頭白楊順師好事堆堆疊疊來不須造作與安排落林黃葉水推去橫谷白雲風捲回寒雁一聲情念斷霜鐘才動我山摧白楊更有過人處盡夜寒爐撥死灰僧潤了妄歸真萬纍空河沙凡聖本來同迷來盡是蛾投焰悟去方如鶴去籠片月影分千澗水孤松聲任四時風直須密契心心也始悟生平睡夢中黃龍和尚古人一切方便與諸人開個入路既得個入路又須尋個出路登山須到頂入海須到底登山不到頂不知宇宙之寬入海不到底不知滄海之深既知寬廣又知淺深一躍躍翻四大海一摑摑倒須彌山撒手到家人不識鵲躁鴉鳴柏樹間安丕師孤峰逈秀不挂𤎆蘿片月行空白雲自在見性不留佛悟道不存師對眼根之塵如見夢時物如觀幻化像對耳根之塵如聞空中風如聽禽鳥語對意根之塵如湯釋氷雪如冶銷金鐵自在禪師即心即佛是無病求病句非心非佛是藥病對治句除亂而不滅照守靜而不著空行之有常自得真見不著色則著空何以能非色非空不住有則住無安足道不有不無無念禪師念本非有念不必無知是義者是名無念如人迷故謂東為西方實不轉無明迷故謂心為念心實不動無牽纏者即為解脫除煩惱者便獲清涼見五藴皆空為深般若得一心寂滅是大涅槃大茅和尚欲識諸佛性向衆生心行中識取欲識不凋性向萬物變遷時識取起心欲息知心起知更煩若知知本空知即衆妙門從悅禪師耳目一何清端居幽谷裡秋風入古松秋月生寒水衲僧於此更求真兩個猢猻垂四尾自性無所無所曰寂人唯逐於前塵念念相續故不能當念而寂回光返照本地風光瞥爾現前一可忘六可消矣性空庵主心法雙忘猶隔妄色塵不二尚餘塵百鳥不來春又過不知誰是住庵人真俗雙泯二諦恆存空有兩忘一味常顯良以真空未嘗不有即有以辨於空幻有未始不空即空以明於有不空之空空而非斷不有之有有而不常四執既亡百非斯遣水庵一禪師藏身無迹更無藏脫體無依便厮當古鏡不勞還自照淡煙和霧濕秋光證空便為實執我乃成虛對病應施藥無病藥還除長慶和尚入道之門須用止觀二法夫理障礙正知見事障續諸生死非大觀之法安除理障非大止之法安能險事障因心悟道道本非心因目成眀明原非目絶妄想而離執著原其所無見德性而證如來本其所有以其所無之理解脫一切諸纏縛以其所有之明照破一切諸昏暗則是大明一慧日矣圓覺禪師遣迷求悟不知迷是悟之鉗鎚愛聖憎凡不知凡是聖之爐鞲祗如聖凡雙泯迷悟兩忘又作麼道半夜彩霞籠玉象天明峰頂五雲遮黃藥禪師日升之時明遍天下虛空未曾明日沒之時暗遍天下虛空未曾暗明暗之境自相凌奪虛空之性廓然自如佛及衆生心亦如是若觀佛作清淨光明相觀衆生作垢濁暗昧相歷河沙劫終不得菩提凡人皆逐境生心若欲無境當忘其心心忘則境空境空則妄滅見善來相迎亦無喜心見惡相種種亦無布念但自忘心同於法界方得自在心無不存之謂照欲無不泯之謂忘忘與照一而二二而一當忘之時其心湛然未嘗不照當照之時纖塵不立未嘗不忘此真忘真照也張拙秀才光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趨向真如總是邪隨順衆緣無罣礙涅槃生死是空華南華禺師求生本自無生畏滅何會暫滅眼見不如耳見口説爭似鼻説水中捉月鏡裡尋頭刻舟求劔騎牛覔牛空華陽焰夢幻浮漚一筆勾下要休便休已歌社酒村田樂不風流處自風流佛與衆生原無分别悟者心能轉物物物歸心即是諸佛迷者皆心向物妄隨物轉即是衆生無垢子三世諸佛盡在自己身中因氣習所昧境物所轉便自迷了若於心無心便是過去佛寂然不動便是未來佛隨機應物便是現在佛清淨無染便是離垢佛出入無礙便是神通佛到處優遊便是自在佛一心不昧便是光明佛道念堅固便是不壞佛變化多方唯一真爾法常禪師佛從無為來滅向無為去法身等虛空常住無心處有念歸無念有住歸無住來為衆生來去為衆生去清淨真如海湛然體常住智者善思惟更勿生疑慮佛體本無為迷情妄分别法身等虛空未曾有生滅有緣佛出世無緣佛入滅處處化衆生猶如水中月非常亦非斷非生亦非滅生亦未曾生滅亦未曾滅了見無深處自然無法説報恩逸公演若達多認影迷頭豈不擔頭覔頭正迷之時頭且不失及乎悟去亦不為得何以故人迷謂之失人悟謂之得得失在乎人何關於動靜清涼國師至道本乎其心心法本乎無住無住心體性相寂然非有非空不生不滅求之而不得棄之而不離迷現量則惑苦紛然悟真性則空明廊徹雖即心即佛唯證者方知然有證有知則慧日沉沒於有地若無照無悟則昏雲掩蔽於空門惟一念不生則前後際斷照體獨立物我皆如無迷悟更依真妄相待若求真去妄猶棄影勞形若體妄即真似處陰息影若無心妄照則妄慮都捐若任運寂知則衆行爰起是以悟寂無寂真知無知以知寂不二之一心契空有雙融之妙理無住無著莫攝莫收是非兩忘能所雙絶斯絶亦寂則般若現前心心作佛無一心而非佛心處處成道無一塵而非佛國故真妄物我舉一全收心佛衆生渾然齊致是知迷則人隨於法法法萬差而人不同悟則法隨於人人人一智而融萬境言窮慮絶何果何因體本寂寥孰同孰異唯忘懷虛朗消息沖融其猶透水月華虛而可見無心鑒像照而常空矣法真禪師桞色含煙春光回秀一峰孤峻萬卉爭妍白雲淡濘已無心滿目青山元不動漁翁垂釣一溪寒色未曾消野渡無人萬古碧潭清似鏡影由形響逐聲來除煩惱而趣涅槃如去形希明禪師林葉紛紛落乾坤報早秋分别西祖意何用更馳求若人深明此旨洞達其源乃知動靜施為行住坐卧頭頭合道念念朝宗祖不云乎迷生寂亂悟無好惡得失是非一時放却如是則誰是誰非誰迷誰悟自是諸人獨生異見觀大觀小執有執無靈根獨耀不肯承當心月孤圓自生違背何異家中捨父衣內忘珠致使菩提路上荆棘成林解脫空中迷雲蔽日兜率禪師龍安山下道路縱橫兜率宫中樓閣重疊雖非天上不是人間到者安心全忘諸念善行者不移雙足善入者不動雙扉自能笑傲煙夢誰管坐消歲月雖然如是且道還有向上事也無艮久曰莫教推落巖前石打破下方蓋日雲道英禪師據道而論語也不得默也不得直饒語默兩忘亦沒交涉何故古佛光明先德風彩一一從無欲無依中發現或時孤峻峭拔竟不可拔或時含融混合了無所覩終不椿定一處亦不繫係兩頭無是無不是無非無不非得亦無所得失亦無所失不曾隔越纖毫不曾移易絲髮明明古路不屬玄微睹面擎來瞥然便過不居正位豈落邪途不趨大小那蹈小徑回首不逢觸目無對一念普觀廓然空寂此之宗要千聖不傳直下了知當處超越是知赤漉漉處恁麼即易明歷歷處恁麼還難若是本分手腳放去無收不來底一一放光現瑞一一削迹絶蹤機上了不停語中無可露徹底攪不渾通身撲不碎畢竟是個甚麼得恁麼靈得恁麼奇特諸仁者休要識渠面孔不用安渠名字亦莫覔渠在所何故渠無在所渠無名字渠無面孔才是一念追求便隔十生五生不如放教自由要發便發要住便住即天然非天然即如如非如如即湛寂非湛寂即敗壞非敗壞無生戀無死畏無佛求無魔布不與菩提會不與煩惱俱不受一法不嫌一法無在無不在非離非不離若能如是見得釋迦自釋迦達摩自達摩宫徽師八萬四千波羅密門門門長開三千大千微塵諸佛佛佛説法不説有不説無不説非有非無不説亦有亦無何也離四句絶百非相逢舉目少人知昨日霜風漏消息梅花依舊綴寒枝慧林受師不是境亦非心唤作佛時也陸沉個中本自無階級切忌無階級處尋總不尋過猶深打破雲門飯袋子方知赤土是黃金無生訣經卷第尾終大明萬曆三十五年嵗次丁未上元吉日正一嗣教凝誠志道闡玄弘教大真人掌天下道教事張國祥奉旨校梓
